# ALEMBIC CONFIG - Cartorio 2 Notas Uberlandia
# Migration tool. Resolve o problema de "Base.metadata.create_all() nao faz ALTER"
# (recorrente: 2026-06-23 migrations aditivas via psql manual).
#
# Uso:
#   alembic revision --autogenerate -m "add canal to audit_log"
#   alembic upgrade head
#   alembic downgrade -1
#
# Em prod (dentro do container):
#   docker exec -it cartorio_api alembic upgrade head
#
# Em CI (antes do deploy):
#   alembic upgrade head
#
# Source of truth: app/models/  (SQLAlchemy models)
# NUNCA edite migrations ja aplicadas. Crie uma nova.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
# Formata com black apos gerar
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
