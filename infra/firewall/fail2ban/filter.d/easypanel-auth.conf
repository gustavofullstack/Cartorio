# Fail2ban filter — Easypanel admin auth brute-force
# Match: tentativas de login falhas no painel Easypanel (porta 3000)
# ATENÇÃO: Easypanel é painel admin. brute-force aqui = crítico.

[Definition]
failregex = ^.*Failed login attempt.*from <HOST>.*$
            ^.*Invalid credentials.*<HOST>.*$
            ^.*auth.*failure.*<HOST>.*$

ignoreregex =

# Notas:
# - Easypanel log format pode variar conforme versão. Ajustar regex se necessário
#   após rodar `fail2ban-regex /var/log/easypanel/*.log /etc/fail2ban/filter.d/easypanel-auth.conf`
# - Se Easypanel não loga nesse formato, alternativa é fail2ban genérico SSH + IP whitelist
#   via Tailscale-only (Gustavo aplica ACL).
# - Bantime alto: 24h. Easypanel é alvo de scanner constante (Shodan, Censys).