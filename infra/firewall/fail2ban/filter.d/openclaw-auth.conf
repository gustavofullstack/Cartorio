# fail2ban filter for OpenClaw Gateway auth failures
# Matches: 401 / 403 responses from OpenClaw on port 18789
# Log path: /var/log/openclaw/access.log (or docker container logs)

[Definition]

failregex = ^<HOST> - - \[.*\] ".*" 401
            ^<HOST> - - \[.*\] ".*" 403
            ^<HOST> - - \[.*\] ".*Invalid.*token"
            ^<HOST> - - \[.*\] ".*Authentication failed"

ignoreregex =
