# Fail2ban filter — Traefik auth/4xx brute-force
# Match: HTTP 401/403/429 em endpoints sensíveis (auth, login, admin, api keys)
# Regex testada contra formato padrão Traefik access log (Common Log Format + time)

[Definition]
failregex = ^<HOST> - [^"]*"(GET|POST|PUT|DELETE) /(api/v1/auth|api/v1/login|admin|api/v1/keys|api/v1/admin)[^"]*" (401|403|429)
            ^<HOST> - [^"]*"(GET|POST|PUT|DELETE) /[^"]*" (401|403) [^"]*"[^"]*"(sqlmap|nikto|nmap|masscan|acunetix|nessus|wpscan|burp)

ignoreregex =

# Notas:
# - Path `/api/v1/auth/*` é o endpoint de login da API Cartório. 5 falhas em 10min = jail.
# - UA com sqlmap/nikto/nmap = scanner conhecido = jail imediato (sem retry).
# - Testar antes de aplicar:
#   fail2ban-regex /var/log/traefik/access.log /etc/fail2ban/filter.d/traefik-auth.conf