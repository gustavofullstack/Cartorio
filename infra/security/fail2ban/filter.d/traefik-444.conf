# Fail2ban filter — Traefik scanners/scraping (444/403 closed-by-middleware)
# Match: requests com 444 (connection closed without response) ou 403 por middleware
# Use case: bloquear IPs que batem em paths inexistentes (probing/scraping) ou que
# são rejeitados por rate limit / IP whitelist / geoblock

[Definition]
failregex = ^<HOST> - [^"]*"(GET|POST|HEAD) [^"]+" 444
            ^<HOST> - [^"]*"(GET|POST|HEAD) [^"]+" 403

ignoreregex = ^<HOST> - [^"]*"(GET|POST|HEAD) /(favicon\.ico|robots\.txt|\.well-known/)" 403

# Notas:
# - 444 = Traefik fechou conexão sem resposta (rate limit middleware)
# - 403 = forbidden (IP whitelist / middleware block)
# - Ignora favicon/robots/well-known que são benignos
# - Testar:
#   fail2ban-regex /var/log/traefik/access.log /etc/fail2ban/filter.d/traefik-444.conf