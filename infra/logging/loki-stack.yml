# Loki + Promtail Stack (J08)
# Agregação de logs estruturados para Grafana

version: "3.8"

networks:
  cartorio_monitoring:
    driver: overlay
    external: true

services:
  loki:
    image: grafana/loki:2.9.3
    container_name: cartorio_loki
    restart: unless-stopped
    networks:
      - cartorio_monitoring
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.3
    container_name: cartorio_promtail
    restart: unless-stopped
    networks:
      - cartorio_monitoring
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
    depends_on:
      - loki

volumes:
  loki_data:
    driver: local
