# Jaeger + OpenTelemetry Collector (J09)
# Distributed tracing stack

networks:
  cartorio_monitoring:
    driver: overlay
    external: true

services:
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: cartorio_jaeger
    restart: unless-stopped
    networks:
      - cartorio_monitoring
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory  # Para MVP (usar ES em prod)
    ports:
      - "16686:16686"   # UI (acessar via http://VPS_IP:16686)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: cartorio_otel_collector
    restart: unless-stopped
    networks:
      - cartorio_monitoring
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel/config.yaml:ro
    ports:
      - "14317:4317"   # OTLP gRPC (host:14317 para evitar conflito com Supabase)
      - "14318:4318"   # OTLP HTTP (host:14318)
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      - jaeger
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
