# Jaeger + OpenTelemetry Collector (J09)
# Distributed tracing stack

version: "3.8"

networks:
  cartorio_monitoring:
    driver: overlay
    external: true

services:
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: cartorio_jaeger
    restart: unless-stopped
    networks:
      - cartorio_monitoring
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory  # Para MVP (usar ES em prod)
    ports:
      - "16686:16686"   # UI
      - "14268:14268"   # Agent (legacy)
      - "14250:14250"   # gRPC
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: cartorio_otel_collector
    restart: unless-stopped
    networks:
      - cartorio_monitoring
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    depends_on:
      - jaeger
